version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: focusfeed
      POSTGRES_PASSWORD: focusfeed_pass
      POSTGRES_DB: focusfeed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://focusfeed:focusfeed_pass@db:5432/focusfeed
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
    depends_on:
      - db

volumes:
  pgdata:
